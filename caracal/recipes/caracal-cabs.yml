cabs:

#  quartical:
#    inputs:
#      input_ms.path:
#        skip_freshness_checks: true

  aimfast:
    inputs:
      compare_models:
        dtype: List[File]
        policies:
          repeat: list

  bdsf.catalog:
    inputs:
      multichan_opts:
        dtype: bool
        required: false
      frequency:
        dtype: float
        required: false

  tigger_convert:
    command: tigger-convert
    inputs:
      input-model:
        dtype: File
        required: true
        policies:
          positional: true
      force:
        dtype: bool
        default: true
    outputs:
      output-model:
        dtype: File
        policies:
          positional: true

  mosaic-queen:
    command: mosaic-queen
    inputs:
      input:
        info: "The directory that contains the (2D or 3D) images and beams"
        dtype: Directory
        writable: true
      beam-cutoff:
        dtype: float
      mosaic-cutoff:
        dtype: float
    outputs:
      outfile:
        dtype: Union[List[File], List[Directory]]
        implicit: "=GLOB('{current.name}*')"
        writable: true

  breizorro:
    info: A tool for creating a binary mask and regions given a FITS image (https://github.com/ratt-ru/breizorro)
    inputs:
      fill-holes:
        dtype: bool
  intervals_out:
    name: IntervalsOut
    info: Outputs time and frequency intervals for selfcal
    flavour:
      kind: python-code
      input_vars: true
    command: |
      if iter > len(time_intervals) or iter > len(freq_intervals):
        time_int = time_intervals[-1]
        freq_int = freq_intervals[-1]
      else:
        time_int = time_intervals[iter-1]
        freq_int = freq_intervals[iter-1]
      if iter > len(jones_types):
        jones_type = jones_types[-1]
      else:
        jones_type = jones_types[iter-1]
    inputs:
      iter:
        dtype: int
      time_intervals:
        dtype: List[List[str]]
      freq_intervals:
        dtype: List[List[str]]
      jones_types:
        dtype: List[str]
      overwrite:
        dtype: bool
    outputs:
      time_int:
        dtype: List[str]
      freq_int:
        dtype: List[str]
      jones_type:
        dtype: str
  iter_out:
    name: IterOutId
    info: Iteration ID of previous iter
    flavour:
      kind: python-code
      input_vars: true
    command: |
      iter_out = iter - 1
    inputs:
      iter:
        dtype: int
    outputs:
      iter-out:
        dtype: int
  maximum_iter:
    name: IterMax
    info: Maximum number of iterations
    flavour:
      kind: python-code
      input_vars: true
    command: |
      max_iter = max(niter)
    inputs:
      niter:
        dtype: List[int]
    outputs:
      max-iter:
        dtype: int
  wsclean:
    inputs:
      dd-psf-grid:
        dtype: List[int]
        policies:
          repeat: list
      pol: 
        choices: [I, IQ, IV, IQU, IQUV]
        default: I
      absmem:
        dtype: float
  generate_mauch_beam:
    info: This gets a Mauchian beam (Mauch et al. 2020).
    flavour:
      kind: python-code
      input_vars: false
      input_dict: args
    command: |
      import numpy as np
      from astropy.io import fits
      outfile = ''
      filename = args.pop("image")
      with fits.open(filename) as image:
          headimage = image[0].header
          for i in range(1, headimage['NAXIS']+1):
              if headimage['CTYPE{0:d}'.format(i)].startswith('FREQ'):
                  freq = headimage['CRVAL{0:d}'.format(i)]
          ang_offset = np.indices((headimage['NAXIS2'], headimage['NAXIS1']), dtype=np.float32)
          ang_offset[0] -= (headimage['CRPIX2'] - 1)
          ang_offset[1] -= (headimage['CRPIX1'] - 1)
          ang_offset = np.sqrt((ang_offset**2).sum(axis=0))  # Using offset in x and y direction to calculate the total offset from the pointing centre
          ang_offset = ang_offset * np.abs(headimage['CDELT1'])  # Now offset is in units of deg
          FWHM_pb = (57.5 / 60) * (freq / 1.5e9)**-1  # Eqn 4 of Mauch et al. (2020), but in deg   # freq is just a float for the 2D case
          pb_image = (np.cos(1.189 * np.pi * (ang_offset / FWHM_pb)) / (
                  1 - 4 * (1.189 * ang_offset / FWHM_pb)**2))**2  # Eqn 3 of Mauch et al. (2020)
          name = filename.replace('image.fits', 'pb.fits')
          fits.writeto(name, pb_image, header=headimage, overwrite=True)
          outfile = name
    inputs:
      image:
        dtype: File
        required: true
    outputs:
      outfile:
        dtype: File
  add_freq_units:
    info: Add the missing unit line.
    flavour:
      kind: python-code
      input_vars: true
    command: |
      from astropy.io import fits
      hdu = fits.open(image, mode='update')
      hdr = hdu[0].header
      # Add missing frequency unit if not defined
      if 'CUNIT3' not in hdr:
          hdr['CUNIT3'] = 'Hz'
      if 'RESTFRQ' not in hdr:
          hdr['RESTFRQ'] = hdr['CRVAL3']
      if not hdr['CTYPE3'].strip().startswith('FREQ'):
          hdr['CTYPE3'] = 'FREQ'
      hdr.comments['CTYPE3'] = 'Observed frequency'
      hdr['CRVAL3'] = rest_freq = abs(float(hdr['CRVAL3']))  # ensure positive spacing
      hdr['CTYPE3']  = 'FREQ-OBS'
      hdr['SPECSYS'] = 'TOPOCENT'
      hdu.flush()
      hdu.close()
    inputs:
      image:
        dtype: File
        required: true
    outputs:
      rest-freq:
        dtype: float
      outfile:
        dtype: File
        implicit: "{current.image}"
