_include:
  - caracal-cabs.yml

## this augments the standard 'opts' config section to tweak logging settings
opts:
  log:
    dir: log-{config.run.datetime}
    name: log-{info.taskname}
    nest: 5
    symlink: log
  backend:
    native:
      enable: true
    singularity:
      enable: false
      auto_build: true
      image_dir: .
    rlimits:
      NOFILE: 10000  # set high limit on number of open files

lib:
  recipes:
    image_products:
      name: Multiplier
      info: make product of mask and list of images
      for_loop:
        var: image
        over: images
        scatter: -1
      inputs:
        mask:
          dtype: File
        images:
          dtype: List[File]
        output-prefix:
          dtype: str
      steps:
        make-image-products-0:
          info: make product of mask and image
          cab: fitstool
          params:
            images: =LIST(recipe.mask, recipe.image)
            prod: true
            output: =DIRNAME(recipe.image) + '/{recipe.output-prefix}' + STRIPEXT(BASENAME(recipe.image)) + '.fits'
    DD_source:
      name: DDModels
      info: make product of corrected model with de-region to get de only model
      for_loop:
        var: region
        over: regions
        #scatter: 4
      inputs:
        regions:
          dtype: List[File]
        image:
          dtype: File
        output-prefix:
          dtype: str
      steps:
        make-region-mask-0:
          info: make breizorro mask
          cab: breizorro
          params:
            merge: recipe.region
            restored-image: recipe.image
            mask: recipe.output-prefix
        make-image-products-0:
          info: make product of mask and image
          cab: fitstool
          params:
            images: =LIST(recipe.mask, recipe.image)
            prod: true
            output: =DIRNAME(recipe.image) + '/{recipe.output-prefix}' + STRIPEXT(BASENAME(recipe.image)) + '.fits'
    sara:
      name: pfb-sara
      info: Imaging recipe using the SARA algorithm.

      inputs:
        ms:
          dtype: List[URI]
          required: true
        base-dir:
          dtype: Directory
          required: true
          mkdir: true
          must_exist: false
          info:
            Base output directory in which to place all output data products.
        image-name:
          dtype: str
          required: true
          info:
            A descriptive name for the outputs to be placed in base-dir.
        data-column:
          dtype: str
          default: DATA
          info:
            Column to image.
            Simple arithmatic is supported e.g. one can use CORRECTED_DATA-MODEL_DATA to image residuals.
        model-column:
          dtype: str
          default: MODEL_DATA
          info:
            Column to write model visibilities to
        weight-column:
          dtype: str
          info:
            Weight column
        sigma-column:
          dtype: str
          info:
            Sigma column (preferred over weight-column if provided)
        fields:
          dtype: List[int]
          info:
            Which fields to image
        scans:
          dtype: List[int]
          info:
            List of scans to image
        gains:
          dtype: List[URI]
          info:
            Gain tables to apply (must match the order in which MS's are passed in)
        robustness:
          dtype: float
          default: -0.3
          info:
            Briggs robustness level.
            Less than -2 corresponds to uniform, larger than 2 or None to natural.
        field-of-view:
          dtype: float
          default: 1.8
        super-resolution-factor:
          dtype: float
          default: 2.0
          info:
            How much to oversample Nyquist by at the highest frequency.
        psf-oversize:
          dtype: float
          default: 1.6
          info:
            Relative size of the PSF compared to the image.
        cell-size:
          dtype: float
          info:
            Cell size in arcseconds.
            Preferred over fov and srf if set.
        nx:
          dtype: int
          info:
            Number of pixels in x direction.
        ny:
          dtype: int
          info:
            Number of pixels in y direction.
        channels-per-image:
          dtype: int
          default: 128
          info:
            Number of channels to combine into an imaging band
        integrations-per-image:
          dtype: int
          default: -1
          info:
            Number of time integrations per dataset
        rmsfactor:
          dtype: float
          default: 1.0
          info:
            Multiple of the rms to threshold by
        chan-average:
          dtype: int
          default: 4
          info:
            How many channels to average together
        freq-range:
          dtype: str
          info:
            Channel range to image passed as a numpy slice.
        bda-decorr:
          dtype: float
          default: 0.98
          info:
            Amount of amplitude loss that can be tolerated at edge of field
        niter:
          dtype: int
          default: 3
          info:
            Number of major cycles
        l1-reweight-from:
          dtype: int
          default: 5
        l2-reweight-dof:
          dtype: float
        alpha:
          dtype: float
          default: 2.0
          info:
            Alpha parameter for the l1 reweighting
        overwrite:
          default: false
          aliases: ['*.overwrite']
        output-filename:
          default: '{current.base-dir}/{current.image-name}'
          aliases: ['*.output-filename']
        fits-output-folder:
          default: =current.base-dir
          aliases: ['*.fits-output-folder']
        log-directory:
          default: '{current.base-dir}/logs'
          aliases: ['*.log-directory']
        transfer-model-from:
          dtype: str
          info:
            Model to start from
        nworkers:
          dtype: int
          default: 4
          info:
            Number of workers.
            This controls the level of horizontal scaling.
            More workers mean a larger memory footprint.
            Set to the expected number of imaging bands if unsure.
        nthreads:
          dtype: int
          default: 16
          info:
            Number of threads per worker.
            This controls the degree of vertical parallelism.
            The total number of threads used during imaging will be nworkers * nthreads.
        product:
          default: I
          aliases: ['*.product']
          info:
            Imaging products to produce.

      steps:
        init:
          cab: pfb.init
          info: 'Initialise imaging data products'
          params:
            ms: =recipe.ms
            gain-table: =IFSET(recipe.gains)
            nthreads: =recipe.nthreads
            nworkers: =recipe.nworkers
            data-column: =recipe.data-column
            weight-column: =IFSET(recipe.weight-column)
            sigma-column: =IFSET(recipe.sigma-column)
            channels-per-image: =recipe.channels-per-image
            integrations-per-image: =recipe.integrations-per-image
            chan-average: =recipe.chan-average
            max-field-of-view: =recipe.field-of-view
            bda-decorr: =recipe.bda-decorr
            freq-range: =IFSET(recipe.freq-range)
            overwrite: =recipe.overwrite
            check-ants: false
            fields: =IFSET(recipe.fields)
            scans: =IFSET(recipe.scans)
            product: =recipe.product
        grid:
          cab: pfb.grid
          info: 'Setup grid for imaging'
          params:
            super-resolution-factor: =IFSET(recipe.super-resolution-factor)
            field-of-view: =IFSET(recipe.field-of-view)
            cell-size: =IFSET(recipe.cell-size)
            nx: =IFSET(recipe.nx)
            ny: =IFSET(recipe.ny)
            robustness: =recipe.robustness
            nthreads: =recipe.nthreads
            nworkers: =recipe.nworkers
            psf-oversize: =recipe.psf-oversize
            overwrite: =recipe.overwrite
            l2-reweight-dof: =IFSET(recipe.l2-reweight-dof)
            # product: =recipe.product
            transfer-model-from: =IFSET(recipe.transfer-model-from)
        sara:
          cab: pfb.sara
          info: Deconvolution step
          params:
            niter: =recipe.niter
            bases: 'self,db1,db2,db3'
            nlevels: 2
            l1-reweight-from: =recipe.l1-reweight-from
            pd-tol: [1.5e-4]
            pd-maxit: 450
            pd-verbose: 2
            pd-report-freq: 50
            tol: 5e-4
            gamma: 0.99
            rmsfactor: =recipe.rmsfactor
            alpha: =recipe.alpha
            eta: 5e-4
            positivity: =IF( recipe.product == 'I', 1, 0)
            nthreads: =recipe.nworkers * recipe.nthreads
            init-factor: =IFSET(recipe.transfer-model-from, 1.0, 0.5)
            # product: =recipe.product
        restore:
          cab: pfb.restore
          info: Produce restored image.
          params:
            nworkers: =recipe.nworkers
            nthreads: =recipe.nthreads
            outputs: iI
            # product: =recipe.product
        degrid:
          cab: pfb.degrid
          info: Render model to visibilities
          params:
            ms: =recipe.ms
            model-column: =recipe.model-column
            nworkers: =recipe.nworkers
            nthreads: =recipe.nthreads
            freq-range: =IFSET(recipe.freq-range)


  steps:
    cubical:
      pa-corr:
        info: "derotate data using cubical"
        cab: cubical
        params:
          data.ms: =recipe.ms
          #parset: cc-parsets/solve-pa.parset
          out.dir: '{recipe.dir-out-base}/corr-{recipe.suffix}-pa'
          out.name: cc
          out.mode: ac
          out.column: PA_CORRECTED_DATA
          madmax.enable: 0
          madmax.residuals: 0
          #model.list: MODEL_DATA
          out.derotate: =recipe.selfcal.pa-rotate
          model.pa-rotate: =recipe.selfcal.pa-rotate
          model.feed-rotate: =IF(recipe.selfcal.pa-rotate, "auto", 0)
          sol.jones: [K]
          k.type: f-slope
          sol.term-iters: 0
          k.max-iter: 0

    quartical:
      qc:
        cab: quartical
        params:
          input_ms:
            path: =recipe.ms
            select_uv_range: =LIST(400*0.33, 0)
            select_fields: [0]
          input_model:
            recipe: MODEL_DATA
            apply_p_jones: =recipe.selfcal.pa-rotate
          solver:
            iter_recipe: [50,50,50]
            propagate_flags: true
            robust: false
          output:
            overwrite: true
            products: [corrected_data]
            columns: =LIST("CORRECTED{info.suffix}_DATA")
            flags: true
            apply_p_jones_inv: =recipe.selfcal.pa-rotate
          mad_flags:
            enable: =recipe.selfcal.mad-flag
            threshold_bl: 6
            threshold_global: 8
            max_deviation: 1000

      k:
        _use: lib.steps.quartical.qc
        params:
          solver:
            terms: [K]
          output:
            products: [corrected_data]
          K:
            type: delay_and_offset
            initial_estimate: false

      p:
        _use: lib.steps.quartical.qc
        params:
          solver:
            terms: [P]
          output:
            products: [corrected_data]
          P:
            type: phase
            initial_estimate: false

      g:
        _use: lib.steps.quartical.qc
        params:
          solver:
            terms: [G]
          output:
            products: [corrected_data]
          G:
            type: diag_complex
            initial_estimate: false

      k-g-solver:
        _use: lib.steps.quartical.k
        params:
          solver:
            terms: [K,G]
            iter_recipe: [50,50,50,50,50]
          output:
            products: [corrected_data]
          G:
            type: complex
            initial_estimate: false

      k-g-diag:
        _use: lib.steps.quartical.k-g-solver
        params:
          solver:
            terms: [K,G]
            iter_recipe: [0,50,0,50,0,50]
          G:
            type: diag_complex

      k-de:
        _use: lib.steps.quartical.k
        params:
          input_model:
            recipe: MODEL{info.suffix}_DATA~DIR1_DATA:DIR1_DATA
          solver:
            terms: [K,dE]
            iter_recipe: [25,25,25,25,25]
          output:
            products: [corrected_residual]
            subtract_directions: [1]
          dE:
            direction_dependent: true
            time_interval: 1
            freq_interval: 32
            type: complex

      k-g-de:
        _use: lib.steps.quartical.k-g-solver
        params:
          input_model:
            recipe: MODEL{info.suffix}_DATA~DIR1_DATA:DIR1_DATA
          solver:
            terms: [K,G,dE]
            iter_recipe: [50,50,50,25,25,25,25]
          output:
            products: [corrected_residual]
            subtract_directions: [1]
          dE:
            direction_dependent: true
            time_interval: 1
            freq_interval: 32
            type: complex

    wsclean:
      base:
        info: "base wsclean settings"
        cab: wsclean
        params:
          ms: =recipe.ms
          size: =recipe.image-npix
          scale: "{recipe.image-cell}asec"
          nchan: =recipe.image-nchans
          abs-threshold: =IFSET(recipe.image-threshold)
          threads: =IFSET(recipe.ncpu)
          nmiter: =IFSET(recipe.image-nmiter)
          column: =IFSET(recipe.image-col)
          use-wgridder: =IFSET(recipe.image-use-wgridder)
          abs-mem: =IFSET(recipe.image-absmem)
          mf-weighting: =IFSET(recipe.image-mf-weighting)
          no-mf-weighting: =IF(recipe.image-mf-weighting, False, True)
          padding: 1.3
          wstack-nwlayers-factor: 3
          deconvolution-channels: =IFSET(recipe.image-deconv-chan)
          multiscale: =IFSET(recipe.image-multiscale)
          multiscale-scales: =IFSET(recipe.image-multiscale-scales)
          multiscale-scale-bias: =IFSET(recipe.image-multiscale-bais)
          #temp-dir: =recipe.image-temp
          log-time: true
          no-update-model-required: =recipe.image-no-update-model-required

      dirty:
        _use: lib.steps.wsclean.base
        info: "wsclean step for dirty-only image"
        params:
          weight: 'briggs 0'
          parallel-gridding: 64

      dirty_pol:
        _use: lib.steps.wsclean.dirty
        info: "wsclean step for dirty-only IQUV image"
        params:
          pol: IQUV

      image:
        _use: lib.steps.wsclean.dirty
        info: "wsclean step for imaging"
        params:
          mgain: =IFSET(recipe.image-mgain)
          gain:  =IFSET(recipe.image-gain)
          weight: 'briggs 0.0'
          #fit-beam: true
          #elliptical-beam: true
          #parallel-deconvolution: 1500
          nmiter: =IFSET(recipe.image-nmiter)
          join-channels: true
          fit-spectral-pol: =recipe.image-specfit-nrcoeff
          save-source-list: true

      image-pol:
        _use: lib.steps.wsclean.image
        info: "wsclean step for IQUV imaging"
        params:
          join-polarizations: true
          pol: IQUV

      predict:
        _use: lib.steps.wsclean.base
        info: "wsclean step for predicting a model"
        params:
          predict: true
          size: =recipe.image-npix
          scale: =recipe.image-cell
          nchan: =recipe.image-nchan
          deconvolution-channels: =recipe.image-deconv-chan

      predict-pol:
        _use: lib.steps.wsclean.predict
        info: "wsclean step for predicting an IQUV model"
        params:
          predict: true
          pol: IQUV
          fit-spectral-pol: =UNSET

    source-finder:
      bdsf:
        info: runs source finder on deep image to make gaul list
        cab: bdsf.catalog
        params:
          thresh_pix: 10
          thresh_isl: 7
          rms_box: [50,50]
          #rms_map: false
          #flagging_opts: true
          #flag_maxsize_bm: 10
          catalog_format: ascii
