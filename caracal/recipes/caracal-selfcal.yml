#!/usr/bin/env -S stimela run --last-recipe
_include:
  - caracal-libs.yml

caracal-selfcal:
  name: CARACal selfcal recipe
  info: "Second generation calibration recipe developed for CaraCal"

  inputs:
    _include: caracal-schema.yml
    obs:
      info: "Selects observation by label -- edit caracal-observation-sets.yml"
      default: mypipeline
    ms:
      dtype: MS
      aliases: ['*.ms']
    selfcal._niters:
      info: Number of iteration to process
      dtype: List[int]
      default: =RANGE(-1+current.selfcal.start-iter, 2+current.selfcal.niter)

  for_loop:
    var: iter
    over: selfcal._niters
    display_status: "{var}={value} {index1}/{total}"

  steps:
    max-iter:
      info: Maximum number of iterations
      cab: maximum_iter
      params:
        niter: =recipe.selfcal._niters

    restore-flags:
      info: restore flags to a specific version
      cab: casa.flagman
      skip: =not recipe.selfcal.rewind-flags-enable
      params:
        ms: =recipe.ms
        versionname: =step.save-flags-0.versionname
        mode: restore

    pa-correction:
      info: invokes cubical to correct for parallactic angle
      skip: =IF(recipe.selfcal.enable, IF(recipe.selfcal.pa-rotate, IF(recipe.iter==0, false, true), true), true)
      skip_if_outputs: fresh
      _use: lib.steps.cubical.pa-corr
      params:
        data.ms: =recipe.ms
        out.column: 'CORRECTED_DATA'
        out.dir: "{recipe.dir-out-base}/selfcal_products/cal-pa.cc-out"
        dist.ncpu: =recipe.ncpu
        dist.min-chunks: =recipe.ncpu
        model.list: ''
        flags.apply: "-cubical0"
        flags.auto-init: legacy
        flags.save: "cubical0"
        flags.save-legacy: auto
        flags.reinit-bitflags: false
        k.save-to: "{recipe.dir-out-base}/selfcal_products/PAsol"

    previous-image-index:
      info: prefix for image files
      cab: iter_out
      params:
        iter: =recipe.iter

    image-pfb:
      info: image and construct initial model image using the DATA/CORRECTED_DATA column
      skip: =IF(recipe.image-enable, IF(recipe.image-algo=="pfb", false, true), true)
      recipe: sara
      params:
        ms: =recipe.ms
        base-dir: "{recipe.dir-out-base}/image_{recipe.iter}"
        image-name: ="{recipe.image-prefix}_{recipe.iter}"
        data-column: =IF(recipe.iter>1, "CORRECTED_DATA",
                   IF(recipe.selfcal.pa-rotate, steps.pa-correction.out.column, recipe.image-col))
        robustness: =recipe.image-robust
        cell-size: =recipe.image-cell
        nx: =recipe.image-npix
        ny: =recipe.image-npix
        niter: =IFSET(recipe.image-nmiter)
        channels-per-image: 256
        rmsfactor: =IF(recipe.iter>1, recipe.image-clean-cutoff[-1], recipe.image-clean-cutoff[0])

    image-wsclean:
      info: image and construct initial model image using the DATA/CORRECTED_DATA column using a mask
      skip: =IF(recipe.image-enable, IF(recipe.image-algo=="wsclean", false, true), true)
      _use: lib.steps.wsclean.image
      skip_if_outputs: exist
      params:
        prefix: ="{recipe.dir-out-base}/image_{recipe.iter}/{recipe.image-prefix}_{recipe.iter}"
        column: =IF(recipe.iter>1, "CORRECTED_DATA",
                   IF(recipe.selfcal.pa-rotate, steps.pa-correction.out.column, recipe.image-col))
        #niter: 100000 #=IFSET(recipe.image-niter)
        auto-threshold: =IF(recipe.iter>1, recipe.image-clean-cutoff[-1], recipe.image-clean-cutoff[0])
        auto-mask: =IF(recipe.iter==0, recipe.image-cleanmask-thr[0], UNSET)
        fits-mask: =IFSET(recipe.image-fits-mask, recipe.image-fits-mask,
                      IFSET(recipe.image-cleanmask-method,
                        IF(recipe.iter>0, "{recipe.dir-out-base}/image_{steps.previous-image-index.iter-out}/{recipe.image-prefix}_{steps.previous-image-index.iter-out}-MFS-mask.fits",
                                UNSET, UNSET), UNSET))
        no-update-model-required: =IF(recipe.iter>0, IF(recipe.image-no-update-model-required, true, false), true)

    generate-beam:
      info: construct mauch beam
      cab: generate_mauch_beam
      skip_if_outputs: exist
      skip: =IF(recipe.image-enable, IF(recipe.image-algo=="wsclean", false, true), true)
      params:
        image: =IF(recipe.selfcal.pa-rotate, steps.image*.restored.i.mfs, steps.image*.restored.mfs)
        outfile: =IF(recipe.selfcal.pa-rotate, '{steps.image*.prefix}-MFS-I-pb.fits', '{steps.image*.prefix}-MFS-pb.fits')

    quality-assess:
      info: image quality assessment
      cab: aimfast
      skip_if_outputs: fresh
      skip: =IF(recipe.image-enable, IF(recipe.image-aimfast-enable, false, true), true)
      params:
        residual_image: =IF(recipe.image-algo=="wsclean", steps.image*.residual.mfs,
          '{steps.image-pfb.base-dir}/{steps.image-pfb.image-name}_I_main_residual_time0000_mfs.fits')
        outfile: '{steps.image*.prefix}-im-{info.suffix}.json'

    masking:
      info: generate a mask
      cab: breizorro
      skip_if_outputs: fresh
      skip: =IF(recipe.image-enable, IF(recipe.image-cleanmask-method=="breizorro", false, true), true)
      params:
        restored-image: =IF(recipe.image-algo=="wsclean", steps.image*.restored.mfs,
          '{steps.image-pfb.base-dir}/{steps.image-pfb.image-name}_I_main_image_time0000_mfs.fits')
        outfile: '{steps.image*.prefix}-MFS-mask.fits'
        outregion: '{steps.image*.prefix}-MFS-mask.rgn'
        threshold: =IF(VALID(recipe.image-cleanmask-thr[recipe.iter]),
                     recipe.image-cleanmask-thr[recipe.iter],
                     recipe.image-cleanmask-thr[-1])
        dilate: =IFSET(recipe.breizorro.dilate)
        fill-holes: =IFSET(recipe.breizorro.fill_holes)

    source-finder:
      info: automatic source finding
      _use: lib.steps.source-finder.bdsf
      skip_if_outputs: exist
      skip: =CASES(not recipe.extract-sources.sourcefinder=='pybdsf', true,
                   not recipe.image-enable, true,
                   not recipe.extract-sources.enable, true, false)
      params:
        image: =IF(recipe.image-algo=="wsclean", steps.image*.restored.mfs,
          '{steps.image-pfb.base-dir}/{steps.image-pfb.image-name}_I_main_image_time0000_mfs.fits')
        advanced_opts: true
        thresh_pix: =IF(recipe.iter>1, recipe.extract-sources.thr-pix[-1],
                                       recipe.extract-sources.thr-pix[0])
        thresh_isl: =IF(recipe.iter>1, recipe.extract-sources.thr-isl[-1],
                                       recipe.extract-sources.thr-isl[0])
        outfile_gaul: =steps.image-*.prefix + '.gaul'
        outfile_srl: =steps.image-*.prefix + '.srl'

    tigger-convert:
      info: convert model to lsm format
      cab: tigger-convert
      skip_if_outputs: exist
      skip: =CASES(not recipe.extract-sources.sourcefinder=='pybdsf', true,
                   not recipe.image-enable, true,
                   not recipe.extract-sources.enable, true, false)
      params:
        input-model: =steps.source-finder.outfile_gaul
        output-type: Tigger
        output-model: =STRIPEXT(steps.source-finder.outfile_gaul) + '.lsm.html'

    cross-assess:
      info: image fidelity assessment
      cab: aimfast
      skip: =CASES(not recipe.aimfast.plot, true,
                   not recipe.image-enable, true,
                   not recipe.extract-sources.enable, true,
                   recipe.iter==0, true, false)
      skip_if_outputs: fresh
      params:
        compare_models: =LIST("{recipe.dir-out-base}/image_{steps.previous-image-index.iter-out}/{recipe.image-prefix}_{steps.previous-image-index.iter-out}.lsm.html", steps.tigger-convert.output-model)
        tolerance: =recipe.aimfast.radius
        html_prefix: "{recipe.dir-out-base}/../reports/{recipe.image-prefix}"
        outfile: =steps.image*.prefix + 'model-compare.json'

    flagsummary-stats:
      info: report flagging statistics after calibration
      cab: casa.flagsummary
      skip: =IF(recipe.iter==steps.max-iter.max-iter, false, true)
      params:
        ms: =recipe.ms

    save-flags:
      info: restore flags to a specific version
      cab: casa.flagman
      skip: true
      params:
        ms: =recipe.ms
        versionname: =step.save-flags-0.versionname
        mode: save

    copycol:
      info: Make a copy of the MODEL_DATA column
      skip: true #=not recipe.copy-model-columns
      cab: msutils.copycol
      params:
        msname: =recipe.ms
        fromcol: MODEL_DATA
        tocol: 'MODEL{info.suffix}_DATA'

    upsample:
      info: upsamples model image to higher frequency resolution
      cab: smops
      skip_if_outputs: fresh
      skip: true
      params:
        ms: =recipe.ms
        input-prefix: =steps.image*.prefix
        output-prefix: "{steps.image*.prefix}-upsampled"
        num-threads: =recipe.ncpu
        polynomial-order: 4
        stokes: =steps.image*.pol
        channels-out: =recipe.upsample-model-channels

    predict:
      _use: lib.steps.wsclean.predict
      skip: true
      params:
        prefix: =IFSET(recipe.upsample-model-channels, steps.upsample-*.output-prefix, steps.image*.prefix)
        nchan: =IFSET(recipe.upsample-model-channels, steps.upsample-*.channels-out, steps.image*.nchan)
        threads: =recipe.ncpu

    predict-copycol:
      info: Make a copy of the MODEL_DATA column
      #skip: =not recipe.copy-model-columns
      skip: true
      cab: msutils.copycol
      params:
        msname: =recipe.ms
        fromcol: MODEL_DATA
        tocol: =IFSET(recipe.upsample-model-channels,
                      'MODEL{info.suffix}_{recipe.upsample-model-channels}_DATA',
                      'MODEL{info.suffix}_DATA')

    time-freq-intervals:
      info: Time and frequency intervals for selfcal
      cab: intervals_out
      skip: =CASES(not recipe.selfcal.enable, true, false)
      params:
        overwrite: =recipe.selfcal.overwrite
        iter: =recipe.iter
        time_intervals: =recipe.selfcal.jones-time
        freq_intervals: =recipe.selfcal.jones-freq
        jones_types: =recipe.selfcal.jones

    selfcal-delay:
      info: Round of delay selfcal
      _use: lib.steps.quartical.k
      skip_if_outputs: fresh
      skip: =CASES(not recipe.selfcal.enable, true,
                   recipe.iter==0, true,
                   recipe.iter==steps.max-iter.max-iter, true,
                   not steps.time-freq-intervals.jones_type=='k', true, false)
      params:
        #input_model.recipe: =IF(recipe.selfcal.cal-model-mode, steps.output-model, MODEL_DATA)
        #input_model.recipe: =steps.tigger-convert-*.output-model
        input_model.recipe: MODEL_DATA
        output.columns: [CORRECTED_DATA]
        output.gain_directory: ="{recipe.dir-out-base}/selfcal_products/" + STRIPEXT(BASENAME(recipe.ms)) + "-K-{recipe.iter}.qc/"
        output.log_directory: ="{recipe.dir-out-base}/selfcal_products/" + STRIPEXT(BASENAME(recipe.ms)) + "-K-{recipe.iter}.qc/log/"
        K.time_interval: =steps.time-freq-intervals.time_int[0]
        K.freq_interval: =steps.time-freq-intervals.freq_int[0]


    selfcal-phase:
      info: Round of phase selfcal
      _use: lib.steps.quartical.p
      skip: =CASES(not recipe.selfcal.enable, true,
                   recipe.iter==0, true,
                   recipe.iter==steps.max-iter.max-iter, true,
                   not steps.time-freq-intervals.jones_type=='p', true, false)
      skip_if_outputs: fresh
      params:
        input_model.recipe: MODEL_DATA
        output.columns: [CORRECTED_DATA]
        output.gain_directory: ="{recipe.dir-out-base}/selfcal_products/" + STRIPEXT(BASENAME(recipe.ms)) + "-P-{recipe.iter}.qc/"
        output.log_directory: ="{recipe.dir-out-base}/selfcal_products/" + STRIPEXT(BASENAME(recipe.ms)) + "-P-{recipe.iter}.qc/log/"
        P.time_interval: =steps.time-freq-intervals.time_int[0]
        P.freq_interval: =steps.time-freq-intervals.freq_int[0]

    selfcal-gain:
      info: Round of gain selfcal
      _use: lib.steps.quartical.g
      skip: =CASES(not recipe.selfcal.enable, true,
                   recipe.iter==0, true,
                   recipe.iter==steps.max-iter.max-iter, true,
                   not steps.time-freq-intervals.jones_type=='g', true, false)
      skip_if_outputs: fresh
      params:
        input_model.recipe: MODEL_DATA
        output.columns: [CORRECTED_DATA]
        output.gain_directory: ="{recipe.dir-out-base}/selfcal_products/" + STRIPEXT(BASENAME(recipe.ms)) + "-G-{recipe.iter}.qc/"
        output.log_directory: ="{recipe.dir-out-base}/selfcal_products/" + STRIPEXT(BASENAME(recipe.ms)) + "-G-{recipe.iter}.qc/log/"
        G.time_interval: =steps.time-freq-intervals.time_int[0]
        G.freq_interval: =steps.time-freq-intervals.freq_int[0]

    selfcal-gain-diag:
      info: Round of gain selfcal
      _use: lib.steps.quartical.k-g-diag
      skip: =CASES(not recipe.selfcal.enable, true,
                   recipe.iter==0, true,
                   recipe.iter==steps.max-iter.max-iter, true,
                   not steps.time-freq-intervals.jones_type=='k-g-diag', true,
                   not recipe.selfcal.overwrite, true, false)
      skip_if_outputs: fresh
      params:
        input_model.recipe: MODEL_DATA
        output.columns: [CORRECTED_DATA]
        output.gain_directory: ="{recipe.dir-out-base}/selfcal_products/" + STRIPEXT(BASENAME(recipe.ms)) + "-G-{recipe.iter}.qc/"
        output.log_directory: ="{recipe.dir-out-base}/selfcal_products/" + STRIPEXT(BASENAME(recipe.ms)) + "-G-{recipe.iter}.qc/log/"
        G.time_interval: =steps.time-freq-intervals.time_int[0]
        G.freq_interval: =steps.time-freq-intervals.freq_int[0]

    selfcal-delay-gain:
      info: Round of delay and gain selfcal
      _use: lib.steps.quartical.k-g-solver
      skip: =CASES(not recipe.selfcal.enable, true,
                   recipe.iter==0, true,
                   recipe.iter==steps.max-iter.max-iter, true,
                   not steps.time-freq-intervals.jones_type=='k-g', true, false)
      skip_if_outputs: fresh
      params:
        input_model.recipe: MODEL_DATA
        output.columns: [CORRECTED_DATA]
        output.gain_directory: ="{recipe.dir-out-base}/selfcal_products/" + STRIPEXT(BASENAME(recipe.ms)) + "-KG-{recipe.iter}.qc/"
        output.log_directory: ="{recipe.dir-out-base}/selfcal_products/" + STRIPEXT(BASENAME(recipe.ms)) + "-KG-{recipe.iter}.qc/log/"
        K.time_interval: =steps.time-freq-intervals.time_int[0]
        K.freq_interval: =steps.time-freq-intervals.freq_int[0]
        G.time_interval: =steps.time-freq-intervals.time_int[-1]
        G.freq_interval: =steps.time-freq-intervals.freq_int[-1]

    selfcal-chain-delay-gain:
      info: Round of delay and gain selfcal
      _use: lib.steps.quartical.k-g-diag
      skip: =CASES(not recipe.selfcal.enable, true,
                   recipe.iter==0, true,
                   recipe.iter==steps.max-iter.max-iter, true,
                   not steps.time-freq-intervals.jones_type=='k-g-diag', true,
                   recipe.selfcal.overwrite, true, false)
      skip_if_outputs: fresh
      params:
        input_model.recipe: MODEL_DATA
        output.columns: [CORRECTED_DATA]
        output.gain_directory: ="{recipe.dir-out-base}/selfcal_products/" + STRIPEXT(BASENAME(recipe.ms)) + "-KG-{recipe.iter}.qc/"
        output.log_directory: ="{recipe.dir-out-base}/selfcal_products/" + STRIPEXT(BASENAME(recipe.ms)) + "-KG-{recipe.iter}.qc/log/"
        K.time_interval: =steps.time-freq-intervals.time_int[0]
        K.freq_interval: =steps.time-freq-intervals.freq_int[0]
        K.load_from: ="{recipe.dir-out-base}/selfcal_products/" + STRIPEXT(BASENAME(recipe.ms)) + "-K-{steps.previous-image-index.iter-out}.qc/K"
        G.time_interval: =steps.time-freq-intervals.time_int[-1]
        G.freq_interval: =steps.time-freq-intervals.freq_int[-1]
