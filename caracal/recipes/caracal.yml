#!/usr/bin/env -S stimela run
_include:
  - caracal-flag.yml
  - caracal-selfcal.yml
  - caracal-ddcal.yml
  - caracal-test-sets.yml[optional,warn]
  - caracal-observation-sets.yml[optional,warn]
_include_post:
  - caracal-srun.yml

caracal-pointings:
  name: "CARACAL pointing loop"
  info: "Process each pointing of the observation separately"

  for_loop:
    var: ms
    over: ms-pointings
    display_status: "{var}={value} {index1}/{total}"

  inputs:
    _include: caracal-schema.yml

  steps:
    flagging:
      recipe: caracal-flag
      skip: =not recipe.flag-enable
      params:
        dir-out-base: =recipe.dir-out-base
        ms: =recipe.ms
    2gc-reductions:
      recipe: caracal-selfcal
      skip: =not recipe.selfcal-enable
      params:
        dir-out-base: =recipe.dir-out-base
        ms: =recipe.ms
    3gc-reductions:
      recipe: caracal-ddcal
      params:
        dir-out-base: =recipe.dir-out-base
        ms: =recipe.ms

mosaic-pointings:
  name: "CARACal mosaicking"
  info: "Create a mosaic for the pointings or image similar pointings together"

  inputs:
    _include: caracal-schema.yml
    out-image-num:
      dtype: int
      default: 3
      # default: =current.reduce-pointings.out_image_num + 1
    stokes:
      default: ""
      dtype: str
      choices: ["", "I", "Q", "U", "V"]

  steps:
    mosaic-image:
      info: "Make mosaic image of all imaged pointings"
      cab: mosaic-queen
      skip_if_outputs: exist
      params:
        target_images: ["*MFS-{recipe.stokes}*image.fits"]
        input: "{recipe.dir-out-base}/image_{recipe.out-image-num}"
        output: "=current.input"
        regrid: true
        # force-regrid: true
        mosaic-cutoff: 0.05
        beam-cutoff: 0.05
        name: CARACal

    add-units:
      info: "Add the missing header frequency unit line."
      cab: add_freq_units
      params:
        image: "{recipe.dir-out-base}/image_{recipe.out-image-num}/{steps.mosaic-image.name}_image.fits"

    source-finder:
      info: "Runs source finder on mosaic image to make a complete local sky model"
      cab: bdsf.catalog
      skip_if_outputs: exist
      params:
        image: =steps.add-units.outfile
        thresh_pix: 4
        thresh_isl: 3
        rms_box: [100, 50]
        rms_map: true
        frequency: =steps.add-units.rest-freq
        multichan_opts: false
        outfile_gaul: "{recipe.dir-out-base}/image_{recipe.out-image-num}/{steps.mosaic-image.name}.gaul"
        outfile_srl: "{recipe.dir-out-base}/image_{recipe.out-image-num}/{steps.mosaic-image.name}.srl"

    tigger-convert:
      info: "Convert source finder full sky model to lsm"
      cab: tigger-convert
      skip_if_outputs: exist
      params:
        input-model: "=steps.source-finder.outfile_gaul"
        output-model: "=STRIPEXT(steps.source-finder.outfile_gaul) + '.lsm.html'"
