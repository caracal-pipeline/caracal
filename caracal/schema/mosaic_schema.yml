type: map
mapping:
  mosaic:
    desc: Mosaic the 2D-images (or cubes) made with the selfcal/crosscal (or line) worker. If not available on disc, the primary beam is built by the mosaic worker, assuming a Gaussian shape with FWHM = 1.02 lambda/D.
    type: map
    mapping:
      enable:
        desc: Execute the mosaic worker.
        type: bool
        required: true
        example: 'False'
      mosaic_type:
        desc: Type of mosaic to be made, either continuum (2D) or line (3D).
        type: str
        enum: ['continuum', 'line']
        required: true
        example: 'continuum'
      line_name:
        desc: Line mode only -- If autoselection is used to find the final cubes, this needs to match the line_name parameter used for the line worker.
        type: str
        required: false
        example: 'HI'
      use_mfs:
        desc: If the images to be mosaicked were created using MFS, in the selfcal or crosscal worker, then this needs to be indicated via this parameter. Ignored if mosaic_type:line.
        type: bool
        required: false
        example: 'True'
      label_in:
        desc: For autoselection of images/cubes to be mosaicked. For mosaic_type:continuum it should match selfcal:label_in, for mosaic_type:line it should match line:label_in.
        type: str
        required: false
        example: 'corr'
      target_images:
        desc: For manual selection images/cubes to be mosaicked. They must be located within (sub-directories of) the parent of "general:output. Their file names must end with "image.fits" and must include the path relative to the parent of "general:output".
        seq:
          - type: str
        required: false
        example: ''
      name:
        desc: The prefix to be used for all output files. Default is the global pipeline prefix general:prefix.
        type: str
        required: false
        example: ''
      num_workers:
        desc: Number of worker threads to distribute the regridding of the input images / cubes to the output mosaic pixel grid. Default=0 means all available threads. The more the workers, the higher the RAM usage.
        type: int
        required: false
        example: '0'
      beam_cutoff:
        desc: The cutoff in the primary beam. The default of 0.1 means going down to the 10 percent level for each pointing. Set to zero for no primary beam cutoff.
        type: float
        required: false
        example: '0.1'
      mosaic_cutoff:
        desc: Sensitivity cutoff in the final mosaic. Pixels with a noise level > minimum mosaic noise / cutoff are blanked in all final products. E.g. The default of 0.2 means blanking in the mosaic all pixels with a noise level > 5x the minimum mosaic noise level. Set to zero for no cutoff (but some cutoff may still result from mosaic:beam_cutoff setting).
        type: float
        required: false
        example: '0.2'
      associated_mosaics:
        desc: Also make mosaics of the associated .fits files, selecting between 'mask', 'model' and 'residual'. Multiple choices allowed. Give user choice as a list. The default is to not make any associated mosaics.
        seq:
          - type: str
        required: false
        example: ''
      pb_type:
        desc: For mosaic_type:continuum only. If no continuum pb.fits are in place create them either as 2D Gaussians or as in Mauch et al. (2020).
        type: str
        enum: ['gaussian', 'mauchian']
        required: false
        example: 'gaussian' 
      dish_diameter:
        desc: If 'pb_type' has been set to 'gaussian', user needs to specify the dish diameter (in units of m).
        type: float
        required: false
        example: '13.5'
      ref_frequency:
        desc: If continuum pb.fits need to be created, specify the reference frequency (in Hz) for appropriate scaling of the PB shape.
        type: float
        required: false
        example: '1383685546.875'
      round_cdelt3:
        desc: For mosaic_type:line only. Round CDELT3 in the header of the input cubes to the number of decimal digits given by this parameter (0 means do not round). This is useful when the CDELT3 values of the input cubes are not identical (which would make the mosaicking algorithm crash) but the differences are small and can be removed with no impact on the science. Note that the CDELT3 values of the input cubes are overwritten with the common, rounded value (if the rounding is sufficient to find a common value). Use with caution.
        type: int
        required: false
        example: '0'
      report:
        type: bool
        required: false
        desc: (Re)generate a full HTML report at the end of this worker.
        example: 'False'
      cabs:
        desc: 'Specifies non-default image versions and/or tags for Stimela cabs. Running with scissors: use with extreme caution.'
        required: false
        seq:
          - type: map
            mapping:
              name:
                type: str
                required: true
                example: 'cabname'
              version:
                type: str
                required: false
                example: ''
              tag:
                type: str
                required: false
                example: ''
        example: ''
