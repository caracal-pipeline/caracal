type: map
mapping:
  rmsynthesis:
    type: map
    desc: make convolved images and/or PB images.
    mapping:
      enable:
        type: bool
        desc: Perform RM-synthesis and RM-CLEAN on QU-cubes
        required: false
        example: 'false'
      ncpus:
        type: int
        required: false
        example: '4'
      label_in:
        type: str
        desc: Label of the input dataset
      cubes:
        type: map
        desc: |
          Cubes to use for rm-synthesis. If unspecified, CARACal will use the 
          autogenerated convolved cubes if they are available. If specified,
          CARACal expects to find them under output/continuum/polarization
        mapping:
          enable:
            type: bool
            desc: Perform RM-synthesis and RM-CLEAN on image-cubes
            required: false
            example: 'false'
          i_cube:
            type: str
            desc: "Not required for RM-synthesis but could be specified"
            required: false
            example: ''
          q_cube:
            type: str
            desc: "Required for RM-synthesis. Uses the CARACal generated Q cube if this is not specified"
            required: false
            example: ''
          u_cube:
            type: str
            desc: "Required for RM-synthesis. Uses the CARACal generated U cube if this is not specified"
            required: false
            example: ''
          v_cube:
            type: str
            desc: "Not required for RM-synthesis but could be specified"
            required: false
            example: ''
      singles:
        type: map
        desc: |
          Use the singular per-channel images for rm-synthesis. If unspecified,
          CARACal will the autogenerated convolved per-channel images if they 
          are available. If specified, CARACal expects to find them under 
          output/continuum/polarization.
        mapping:
          enable:
            type: bool
            desc: Perform RM-synthesis and RM-CLEAN on per-channel images
            required: false
            example: 'false'
          i_prefix:
            type: str
            desc: |
              Prefix for the per-channel I images to be searched for and used.
              Note that this pattern is directly passed AS IS to glob, please ensure it is correct.
              Not required for RM-synthesis but could be specified"
            required: false
            example: ''
          q_prefix:
            type: str
            desc: |
              Prefix for the per-channel Q images to be searched for and used. 
              Note that this pattern is directly passed AS IS to glob, please ensure it is correct.
              Required for RM-synthesis
            required: false
            example: ''
          u_prefix:
            type: str
            desc: |
              Prefix for the per-channel U images to be searched for and used. 
              Note that this pattern is directly passed AS IS to glob, please ensure it is correct.
              Required for RM-synthesis
            required: false
            example: ''
          v_prefix:
            type: str
            desc: |
              Prefix for the per-channel V images to be searched for and used.
              Note that this pattern is directly passed AS IS to glob, please ensure it is correct.
              Not required for RM-synthesis but could be specified
            required: false
            example: ''
      cutoff:
        type: float
        desc: Text file containing channel frequencies
        required: false
      freq_file:
        type: str
        desc: Text file containing channel frequencies
        required: false
        example: 'frequencies.dat'
      max_iter:
        type: int
        desc: Maximum number of CLEAN iterations per pixel.
        required: false
        example: '1000'
      max_phi:
        type: int
        desc: Absolute max Faraday depth sampled
        required: true
      n_samples:
        type: int
        desc: "Number of samples across the RMSF lobe"
        required: false
        example: '1'
      prefix:
        type: str
        desc: |
          Prefix for the output files.
          will be interpreted as
        required: false
        example: 'rmsynthesis-caracal'
      report:
        type: bool
        required: false
        desc: (Re)generate a full HTML report at the end of this worker.
        example: 'False'
      use_i:
        type: bool
        required: false
        desc: |
          Enable/Disable the use of Stokes I when it is explicitly provided or 
          available. Default is false.
        example: 'False'
      cabs:
        desc: 'Specifies non-default image versions and/or tags for Stimela cabs. Running with scissors: use with extreme caution.'
        required: false
        seq:
          - type: map
            mapping:
              name:
                type: str
                required: true
                example: 'cabname'
              version:
                type: str
                required: false
                example: ''
              tag:
                type: str
                required: false
                example: ''