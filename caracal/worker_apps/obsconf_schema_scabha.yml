name: obsconf
info: Set up some basic information about the observation(s).
inputs:
  obsinfo:
    enable:
      info: Enable segment 'obsinfo'.
      dtype: bool
      required: true
    listobs:
      info: Run the CASA 'listobs' task to write the observation information to an
        TXT file. This is not executed if the TXT file already exists.
      dtype: bool
      required: false
      default: true
    summary_json:
      info: Run the MSUtils summary function to get observation information written
        as a JSON file, which can then be used to automatically configure pipeline.
        This is not executed if the JSON file already exists.
      dtype: bool
      required: false
      default: true
    vampirisms:
      info: Return the time range over which observations were taken at night.
      dtype: bool
      required: false
      default: true
    plotelev:
      enable:
        info: Enable segment 'plot_elevation_tracks'. This is not executed if the
          elevation plots already exist.
        dtype: bool
        default: true
        required: false
      plotter:
        info: The application to be used for making plots. Options are 'plotms' and
          'owlcat'.
        dtype: str
        choices:
        - plotms
        - owlcat
        default: owlcat
        required: false
  target:
    info: The field name(s) of the target field(s), separated by commas if there are
      multiple target fields. Or set this parameter to 'all' to select all of the
      target fields.
    required: false
    default:
    - all
    dtype: List[str]
  gcal:
    info: The field name(s) of the gain (amplitude/phase) calibrator field(s). Or
      set 'all' to select all of the gcal fields, 'longest' to select the gcal field
      observed for the longest time, or 'nearest' to select the gcal field closest
      to the target. Note that if multiple targets and gcals are present, then 'all'
      (for both the 'target' and 'gcal' parameters) means that each target will be
      paired with the closest gcal.
    required: false
    default:
    - all
    dtype: List[str]
  bpcal:
    info: The field name(s) of the bandpass calibrator field(s). Or set 'all' to select
      all of the bpcal fields, 'longest' to select the bpcal field observed for the
      longest time, or 'nearest' to select the bpcal field closest to the target.
    required: false
    default:
    - longest
    dtype: List[str]
  fcal:
    info: The field name(s) of the fluxscale calibrator field(s). Or set 'all' to
      select all of the fcal fields, 'longest' to select the fcal field observed for
      the longest time, or 'nearest' to select the fcal field closest to the target.
    required: false
    default:
    - longest
    dtype: List[str]
  xcal:
    info: The field name(s) of the crosshand phase-angle calibrator field(s). Or set
      'all' to select all of the xcal fields, 'longest' to select the xcal field observed
      for the longest time, or 'nearest' to select the xcal field closest to the target.
      This calibrator must be linearly polarized and have a non-zero parallactic angle
      coverage at the time of observation in order to solve for the X-Y offsets in
      digitizers and the absolute polarization angle of the system. Successful calibration
      derotates U from V.
    required: false
    default:
    - longest
    dtype: List[str]
  refant:
    info: The reference antenna, which can be identified by an antenna name or number.
      Default is 'auto'. i.e. refant is selected automatically based on the parameters
      'maxdist' and 'minbase' below.
    dtype: str
    required: false
    default: auto
  maxdist:
    info: If 'refant' is set to 'auto' above, this sets the maximum distance the reference
      antenna should be from the array centre. Units are in 'm'.
    dtype: float
    required: false
    default: 1000.0
  minbase:
    info: If 'refant' is set to 'auto' above, this sets the minimum baseline length
      required for a reference antenna. Units are in 'm'.
    dtype: float
    required: false
    default: 150.0
  report:
    dtype: bool
    required: false
    info: (Re)generate a full HTML report at the end of this worker.
    default: true
  cabs:
    name:
      dtype: str
      required: true
    version:
      dtype: str
      required: false
    tag:
      dtype: str
      required: false
